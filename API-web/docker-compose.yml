version: '3.8'

services:
  api-web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: api-web
    ports:
      - "4444:4444"
    environment:
      - NODE_ENV=production
      - TRON_NETWORK=https://api.trongrid.io
      - ETH_RPC_URL=https://eth.llamarpc.com
      - PORT=4444
      - DB_HOST=api-web-postgres
      - DB_PORT=5432
      - DB_USER=root
      - DB_PASSWORD=apiwebpassword
      - DB_NAME=apiweb
      - REDIS_HOST=api-web-redis
      - REDIS_PORT=6379
    depends_on:
      - api-web-postgres
      - api-web-redis
    restart: unless-stopped
    networks:
      - api-web-network

  api-web-postgres:
    image: postgres:15-alpine
    container_name: api-web-postgres
    environment:
      - POSTGRES_PASSWORD=apiwebpassword
      - POSTGRES_USER=root
      - POSTGRES_DB=apiweb
    ports:
      - "5433:5432"
    volumes:
      - apiweb_postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    restart: unless-stopped
    networks:
      - api-web-network

  api-web-redis:
    image: redis:7-alpine
    container_name: api-web-redis
    ports:
      - "6380:6379"
    restart: unless-stopped
    networks:
      - api-web-network

networks:
  api-web-network:
    driver: bridge

volumes:
  apiweb_postgres_data:
